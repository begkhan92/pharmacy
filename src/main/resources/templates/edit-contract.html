<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eng">
<head>
  <title>Kontrakt Üýtgetmek</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>
<h1>Kontrakt Üýtgetmek</h1>

<form th:action="@{/contract/update/{id}(id=${contract.id})}" th:object="${contract}" method="post">
  <label>Nomer: <input type="number" th:field="*{number}" /></label><br>
  <label>Başlady: <input type="date" th:field="*{startDate}" /></label><br>
  <label>Gutarýar: <input type="date" th:field="*{expireDate}" /></label><br>
  <label>Lisenziýa: <input type="text" th:field="*{licenceNumber}" /></label><br>
  <label>Imp: <input type="text" th:field="*{impNumber}" /></label><br>
  <label>Birža: <input type="date" th:field="*{birzaDate}" /></label><br>
<!--  <label>Ady: <input type="text" th:field="*{name}" /></label><br>-->
  <button type="submit">Üýtget</button>
</form>

<a th:href="@{/contract}">Yza</a>

</body>
</html>
