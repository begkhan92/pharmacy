<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eng">
<head>
  <title>Ýük goşmak</title>

</head>
<body>
<h1>Inwoise goşmak</h1>
<form th:action="@{/invoices/save}" th:object="${invoice}" method="post">

  <label>Sene: <input type="date" th:field="*{invoiceDate}" /></label><br>
  <button type="submit">Ok</button>

  <div class="add-drug-btn">
    <button><a th:href="@{/invoices/add-invoice}">Inwois goşmak</a></button>
    <button><a th:href="@{/invoices/add-invoice}">Inwois goşmak</a></button>
  </div>
</form>
</body>
</html>
